services:
  clawdeckx:
    image: knowhunters/clawdeckx:latest
    container_name: clawdeckx
    init: true
    restart: unless-stopped
    ports:
      - "18791:18791"
    volumes:
      - clawdeckx-data:/data/clawdeckx
      # Persist OpenClaw installation, config, and logs across container updates
      # 持久化 OpenClaw 安装、配置与日志，容器更新后无需重装
      - clawdeckx-openclaw-data:/data/openclaw
    environment:
      OPENCLAW_HOME: /data/openclaw/home
      OPENCLAW_STATE_DIR: /data/openclaw/state
      OPENCLAW_CONFIG_PATH: /data/openclaw/state/openclaw.json
      NPM_CONFIG_PREFIX: /data/openclaw/npm
      OCD_DB_SQLITE_PATH: /data/clawdeckx/ClawDeckX.db
      OCD_LOG_FILE: /data/clawdeckx/ClawDeckX.log
      OCD_GATEWAY_LOG: /data/openclaw/logs/gateway.log
      OCD_SETUP_INSTALL_LOG: /data/openclaw/logs/install.log
      OCD_SETUP_DOCTOR_LOG: /data/openclaw/logs/doctor.log
      # OpenClaw Gateway connection config
      # If Gateway runs on host, use host.docker.internal (Mac/Windows)
      # or host's real IP (Linux)
      # 如果 Gateway 运行在宿主机，使用 host.docker.internal（Mac/Windows）
      # 或使用宿主机实际 IP（Linux）
      OCD_OPENCLAW_GATEWAY_HOST: host.docker.internal
      OCD_OPENCLAW_GATEWAY_PORT: 18789
      # OCD_OPENCLAW_GATEWAY_TOKEN: your_token_here
    extra_hosts:
      # Required on Linux; Mac/Windows already resolve host.docker.internal
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18791/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    # Log rotation: prevent unbounded log growth
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - clawdeckx-net

networks:
  clawdeckx-net:
    driver: bridge

volumes:
  clawdeckx-data:
  clawdeckx-openclaw-data:
